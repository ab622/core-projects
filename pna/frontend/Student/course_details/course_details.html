<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details</title>
    <link rel="stylesheet" href="course_details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="course-container">
        <!-- Video Player Section -->
        <div class="video-section">
            <div class="video-player">
                <!-- Video player will be here -->
            </div>
            
            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="likeBtn" class="action-btn like-btn">
                    <i class="far fa-heart"></i>
                    Like
                </button>
                <button id="saveCourseBtn" class="action-btn save-btn">
                    <i class="far fa-bookmark"></i>
                    Save Course
                </button>
                <button id="commentBtn" class="action-btn comment-btn">
                    <i class="far fa-comment"></i>
                    Comment
                </button>
                <button id="viewContentBtn" class="action-btn view-btn">
                    <i class="far fa-eye"></i>
                    View Content
                </button>
                <button id="downloadContentBtn" class="action-btn download-btn">
                    <i class="fas fa-download"></i>
                    Download Content
                </button>
            </div>
        </div>

        <!-- Right Column -->
        <div class="right-column">
            <!-- Feedback Box -->
            <div class="white-box">
                <div class="dots-header">
                    <span class="dot blue"></span>
                    <span class="dot purple"></span>
                    <span class="dot pink"></span>
                </div>
                <div class="feedback-content">
                    <input type="text" id="nameInput" placeholder="Your Name" class="feedback-input">
                    <input type="email" id="emailInput" placeholder="Your Email" class="feedback-input">
                    <textarea id="feedbackTextarea" placeholder="Write your feedback..."></textarea>
                    <button class="submit-btn">
                        <i class="far fa-paper-plane"></i>
                        Submit Feedback
                    </button>
                </div>
            </div>

            <!-- Comment Box -->
            <div id="commentSection" class="white-box">
                <div class="dots-header">
                    <span class="dot blue"></span>
                    <span class="dot purple"></span>
                    <span class="dot pink"></span>
                </div>
                <div class="comment-content">
                    <textarea id="commentTextarea" placeholder="Write your comment..."></textarea>
                    <button class="submit-btn">
                        <i class="far fa-paper-plane"></i>
                        Submit
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="course_details.js"></script>
</body>
</html>
