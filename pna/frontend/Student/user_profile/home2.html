<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="home2.css">
    <link rel="stylesheet" href="/pna/frontend/bootstrap-5.3.3-dist/css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Profile</title>
    <link href="/pna/Img/PNA.png" rel="icon">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <a href="/pna/frontend/home1/home1.html">
                <img src="/pna/Img/PNA.png" alt="PNA Logo">
            </a>
        </div>
        <div class="nav-links">
            <a href="/pna/frontend/Student/user_dashboard/userdashboard.html" class="nav-item ">
                <i class="bi bi-house-fill"></i>
            </a>
            <a href="/pna/frontend/Student/Cirteficate/cirteficate.html" class="nav-item">
                <i class="bi bi-mortarboard-fill"></i>
            </a>
            <a href="" class="nav-item active">
                <i class="bi bi-person-fill"></i>
            </a>
            <a href="/pna/frontend/Student/Message/message.html" class="nav-item">
                <i class="bi bi-envelope-fill"></i>
            </a>
            <a href="/pna/frontend/Student/Setting/setting.html" class="nav-item">
                <i class="bi bi-gear-fill"></i>
            </a>
        </div>
        <a href="/pna/frontend/logout/logout.html" class="nav-item bottom-link">
            <i class="bi bi-box-arrow-right"></i>
        </a>
    </aside>

    <main class="main-content">
        <div class="header">
            <div class="welcome-box">
                <div class="welcome-text">
                    <h1 id="welcomeMessage">Hello !</h1>
                    <p>It's good to see you again.</p>
                </div>
                <div class="avatar"></div>
            </div>
            <div class="stats-box">
                <div class="stat">
                    <h2>11</h2>
                    <p>Courses completed</p>
                </div>
                <div class="stat">
                    <h2>4</h2>
                    <p>Courses in progress</p>
                </div>
            </div>
        </div>

        <div class="current-course">
            <div class="course-flag">🇪🇸</div>
            <div class="course-info">
                <h3>Spanish B2</h3>
                <p>by Alejandro Velazquez</p>
            </div>
            <div class="progress-circle">83%</div>
            <button class="continue-btn">Continue</button>
            <div class="navigation">
                <button class="nav-btn prev">←</button>
                <button class="nav-btn next">→</button>
            </div>
        </div>

        <div class="courses-section">
            <h2>Courses</h2>
            <div class="course-tabs">
                <button class="tab active">All Courses</button>
                <button class="tab">The Newest</button>
                <button class="tab">Top Rated</button>
                <button class="tab">Most Popular</button>
            </div>
            <div class="course-list">
                <!-- Courses will be added by JavaScript -->
            </div>
        </div>

        <div class="dashboard-bottom">
            <div class="statistics">
                <div class="stats-header">
                    <h2>Your statistics</h2>
                    <div class="stats-nav">
                        <span class="active">Learning Hours</span>
                        <span>My Courses</span>
                        <select class="period-select">
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                </div>
                <canvas id="learningChart"></canvas>
            </div>
            <div class="premium-box">
                <h3>Learn even more!</h3>
                <p>Unlock premium features only for $9.99 per month.</p>
                <button class="premium-btn">Go Premium</button>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="home2.js"></script>
    <script src="/pna/frontend/bootstrap-5.3.3-dist/js/bootstrap.js"></script>
    <script src="/pna/backend/student/home2/userprofile.js"></script>
    <script src="/pna/frontend/shared/auth.js"></script>
</body>
</html>
